# Identity + Keycloak with external PostgreSQL database
# Combine with oidc.yaml for OIDC authentication.
# Mutually exclusive with identity-keycloak-internal-postgres.yaml.
#
# Defaults already provide:
#   identity.externalDatabase.enabled: false # only needed for resource authorization, multi-tenancy, or an external identity provider (IdP)
#   identityKeycloak.ingress.enabled: false
#   identityKeycloak.auth.existingSecret: camunda-credentials
#   identityKeycloak.auth.passwordSecretKey: identity-keycloak-admin-password

identity:
  enabled: true
  contextPath: /management
  fullURL: <IDENTITY_EXT_URL>/management
  firstUser:
    secret:
      existingSecret: "camunda-credentials"
      existingSecretKey: "identity-first-user-password"
  env:
    - name: KEYCLOAK_REALM
      value: <KEYCLOAK_REALM>

identityKeycloak:
  enabled: true
  extraEnvVars:
    - name: KC_HOSTNAME
      value: "<YOUR_HOSTNAME>"
    - name: KC_HOSTNAME_STRICT
      value: "false"
    - name: KC_HTTP_ENABLED
      value: "true"
    - name: KC_HTTP_RELATIVE_PATH
      value: "/auth"
  postgresql:
    enabled: false
  externalDatabase:
    host: "<POSTGRES_KEYCLOAK_HOST>"
    port: 5432
    database: "<POSTGRES_KEYCLOAK_DB>"
    user: "<POSTGRES_KEYCLOAK_USERNAME>"
    existingSecret: "camunda-credentials"
    existingSecretKey: "identity-postgresql-user-password"
