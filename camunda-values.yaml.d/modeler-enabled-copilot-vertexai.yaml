webModeler:
  contextPath: /modeler
  enabled: true
  restapi:
    mail:
      # This value is required, otherwise the restapi pod wouldn't start.
      fromAddress: noreply@example.com
    env:
      - name: CAMUNDA_MODELER_CLUSTERS_0_ID
        value: "camunda-demo-cluster"
      - name: CAMUNDA_MODELER_CLUSTERS_0_NAME
        value: "Camunda Demo Cluster"
      - name: CAMUNDA_MODELER_CLUSTERS_0_VERSION
        value: "<CAMUNDA_VERSION>"
      - name: CAMUNDA_MODELER_CLUSTERS_0_AUTHENTICATION
        value: "BEARER_TOKEN"
      - name: CAMUNDA_MODELER_CLUSTERS_0_URL_GRPC
        value: "grpc://camunda-zeebe-gateway:26500"
      - name: CAMUNDA_MODELER_CLUSTERS_0_URL_REST
        value: "http://camunda-zeebe-gateway"
      - name: CAMUNDA_MODELER_CLUSTERS_0_URL_WEBAPP
        value: "http://camunda-zeebe/orchestration"
      - name: CAMUNDA_MODELER_CLUSTERS_0_AUTHORIZATIONS_ENABLED
        value: "true"
      - name: LOGGING_LEVEL_IO_GRPC
        value: "TRACE"
      - name: LOGGING_LEVEL_IO_CAMUNDA_MODELER
        value: "DEBUG"
      - name: SPRING_PROFILES_INCLUDE
        value: "default-logging"
      - name: CAMUNDA_MODELER_GITSYNC_GITHUB_BASEURL
        value: https://api.github.com
      - name: CAMUNDA_MODELER_GITSYNC_MAXFILES
        value: "50"
      - name: FEATURE_AI_ENABLED
        value: "true"
      - name: RESTAPI_BPMN_COPILOT_DEFAULT_LLM_PROVIDER
        value: "VERTEX_AI"
      - name: RESTAPI_COPILOT_VERTEX_AI_DEFAULT_MODEL_ID
        value: "<RESTAPI_COPILOT_VERTEX_AI_DEFAULT_MODEL_ID>"
      - name: RESTAPI_COPILOT_VERTEX_AI_PROJECT_ID
        value: "<RESTAPI_COPILOT_VERTEX_AI_PROJECT_ID>"
      - name: RESTAPI_COPILOT_VERTEX_AI_LOCATION
        value: "<RESTAPI_COPILOT_VERTEX_AI_LOCATION>"
      - name: RESTAPI_COPILOT_VERTEX_AI_CREDENTIALS_JSON
        valueFrom:
          secretKeyRef:
            name: webmodeler-vertex-ai
            key: credentials.json
      # Verbose debug logging for BPMN Copilot + Vertex AI.
      # WARNING: LOG_REQUEST/LOG_RESPONSE emit raw LLM payloads — not for production.
      - name: RESTAPI_BPMN_COPILOT_LOG_REQUEST
        value: "true"
      - name: RESTAPI_BPMN_COPILOT_LOG_RESPONSE
        value: "true"
      - name: LOGGING_LEVEL_IO_CAMUNDA_COPILOT
        value: "DEBUG"
      - name: LOGGING_LEVEL_IO_CAMUNDA_MODELER_SERVICE_COPILOT
        value: "DEBUG"
      - name: LOGGING_LEVEL_DEV_LANGCHAIN4J
        value: "DEBUG"
      - name: LOGGING_LEVEL_COM_GOOGLE_CLOUD_VERTEXAI
        value: "DEBUG"


