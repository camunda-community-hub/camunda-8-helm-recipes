# Helm chart values are imported from `../../camunda-values.yaml.d` via `config.mk`.
# This file only contains additional overrides.
# Note that array values, e.g. `orchestration.env` can NOT be merged by Helm.
elasticsearch:
  enabled: true
prometheusServiceMonitor:
  enabled: true
  labels:
    release: metrics
global:
  security:
    authentication:
      method: oidc
  identity:
    auth:
      enabled: true
      publicIssuerUrl: https://example.com/auth/realms/camunda-platform
      issuerBackendUrl: http://camunda-keycloak/auth/realms/camunda-platform
      authUrl: https://example.com/auth/realms/camunda-platform/protocol/openid-connect/auth
      tokenUrl: http://camunda-keycloak/auth/realms/camunda-platform/protocol/openid-connect/token
      jwksUrl: http://camunda-keycloak/auth/realms/camunda-platform/protocol/openid-connect/certs
      identity:
        redirectUrl: https://example.com/management
      orchestration:
        secret:
          existingSecret: camunda-credentials
          existingSecretKey: identity-orchestration-client-token
        redirectUrl: https://example.com/orchestration
      # The secret is required by Identity even when Optimize is disabled.
      # redirectUrl is consumed by the Optimize chart template
      # (global.identity.auth.optimize.redirectUrl -> ccsm.redirectRootUrl)
      # and is harmless when Optimize is disabled.
      optimize:
        secret:
          existingSecret: camunda-credentials
          existingSecretKey: identity-optimize-client-token
        redirectUrl: https://example.com/optimize
      webModeler:
        redirectUrl: https://example.com/modeler
      console:
        redirectUrl: https://example.com/console
    keycloak:
      url:
        protocol: http
        host: camunda-keycloak
        port: 80
      # contextPath defaults to /auth
      realm: /realms/camunda-platform
      auth:
        adminUser: admin
        existingSecret: "camunda-credentials"
        existingSecretKey: "identity-keycloak-admin-password"
  elasticsearch:
    enabled: true
  multitenancy:
    enabled: true
connectors:
  security:
    authentication:
      method: oidc
      oidc:
        secret:
          existingSecret: camunda-credentials
          existingSecretKey: identity-connectors-client-token
identity:
  enabled: true
  contextPath: /management
  fullURL: https://example.com/management
  firstUser:
    secret:
      existingSecret: "camunda-credentials"
      existingSecretKey: "identity-first-user-password"
  env:
    - name: KEYCLOAK_REALM
      value: camunda-platform
  multitenancy:
    enabled: true
identityPostgresql:
  enabled: true
  auth:
    existingSecret: camunda-credentials
# Keycloak will be installed and will use internally provisioned PostgreSQL database
identityKeycloak:
  enabled: true
  postgresql:
    auth:
      existingSecret: camunda-credentials
      # Override default key names so Keycloak's internal PostgreSQL
      # shares the same secret keys as identityPostgresql:
      secretKeys:
        adminPasswordKey: identity-postgresql-admin-password
        userPasswordKey: identity-postgresql-user-password
webModeler:
  contextPath: /modeler
  enabled: true
  # WebSocket public reachability for the browser client.
  # The chart only auto-fills these from global.ingress when global.ingress.enabled=true.
  # Recipes that use Traefik IngressRoute CRDs (no chart-managed Ingress) need them set here.
  # For chart-managed Ingress recipes these are ignored — global.ingress.host wins.
  websockets:
    publicHost: example.com
    publicPort: 443
    env:
      # Tell the websocket server it is mounted at /modeler-ws so it accepts
      # requests on that prefix instead of "/".
      - name: PUSHER_APP_PATH
        value: "/modeler-ws"
  restapi:
    # Stable Pusher app key + secret sourced from the camunda-credentials secret
    # so values do not rotate on `helm upgrade` (the chart otherwise regenerates
    # them via randAlphaNum on every render). Both restapi and websockets
    # consume the same refs, so they always agree.
    pusher:
      secret:
        existingSecret: camunda-credentials
        existingSecretKey: webmodeler-pusher-app-secret
      client:
        secret:
          existingSecret: camunda-credentials
          existingSecretKey: webmodeler-pusher-app-key
    mail:
      # This value is required, otherwise the restapi pod wouldn't start.
      fromAddress: noreply@example.com
    env:
      # Override pusher.client.force-tls and pusher.client.path in the restapi's
      # application.yaml. Required when global.ingress.enabled is false — the
      # chart hard-codes force-tls=false and omits the path in that case.
      - name: CAMUNDA_MODELER_PUSHER_CLIENT_FORCETLS
        value: "true"
      - name: CAMUNDA_MODELER_PUSHER_CLIENT_PATH
        value: "/modeler-ws"
      - name: CAMUNDA_MODELER_CLUSTERS_0_ID
        value: "camunda-demo-cluster"
      - name: CAMUNDA_MODELER_CLUSTERS_0_NAME
        value: "Camunda Demo Cluster"
      - name: CAMUNDA_MODELER_CLUSTERS_0_VERSION
        value: "8.9.0"
      - name: CAMUNDA_MODELER_CLUSTERS_0_AUTHENTICATION
        value: "BEARER_TOKEN"
      - name: CAMUNDA_MODELER_CLUSTERS_0_URL_GRPC
        value: "grpc://camunda-zeebe-gateway:26500"
      - name: CAMUNDA_MODELER_CLUSTERS_0_URL_REST
        value: "http://camunda-zeebe-gateway"
      - name: CAMUNDA_MODELER_CLUSTERS_0_URL_WEBAPP
        value: "http://camunda-zeebe/orchestration"
      - name: CAMUNDA_MODELER_CLUSTERS_0_AUTHORIZATIONS_ENABLED
        value: "true"
      - name: LOGGING_LEVEL_IO_GRPC
        value: "TRACE"
      - name: LOGGING_LEVEL_IO_CAMUNDA_MODELER
        value: "DEBUG"
      - name: SPRING_PROFILES_INCLUDE
        value: "default-logging"
      - name: CAMUNDA_MODELER_GITSYNC_GITHUB_BASEURL
        value: https://api.github.com
      - name: CAMUNDA_MODELER_GITSYNC_MAXFILES
        value: "50"
webModelerPostgresql:
  enabled: true
  auth:
    existingSecret: "camunda-credentials"
    secretKeys:
      adminPasswordKey: webmodeler-postgresql-admin-password
      userPasswordKey: webmodeler-postgresql-user-password
orchestration:
  data:
    secondaryStorage:
      type: elasticsearch
  contextPath: /orchestration
  security:
    authentication:
      oidc:
        secret:
          existingSecret: "camunda-credentials"
          existingSecretKey: "identity-orchestration-client-token"
        redirectUrl: https://example.com/orchestration
  multitenancy:
    checks:
      enabled: true
    api:
      enabled: true
# Optimize connected to Elasticsearch.
# Host/port/protocol fall back to global.elasticsearch settings
# from enable-elasticsearch.yaml, so only component-specific overrides here.
# OIDC redirect for Optimize is configured via global.identity.auth.optimize.redirectUrl
# in oidc.yaml — the chart maps that to ccsm.redirectRootUrl in Optimize's app config.
optimize:
  enabled: true
  contextPath: "/optimize"
  migration:
    enabled: false
  env:
    - name: ES_LOG_LEVEL
      value: "trace"
console:
  enabled: true
  contextPath: "/console"
  overrideConfiguration: |
    camunda:
      console:
        managed:
          releases:
            - name: "camunda"
              namespace: "camunda"
              components:
                - id: "console"
                  url: "https://example.com/console"
                - id: "keycloak"
                  url: "https://example.com/auth"
                - id: "identity"
                  url: "https://example.com/management"
                - id: "webModelerWebApp"
                  url: "https://example.com/modeler"
                - id: "optimize"
                  url: "https://example.com/optimize"
                - id: "connectors"
                  url: "https://example.com/connectors"
                - id: "operate"
                  url: "https://example.com/orchestration/operate"
                - id: "tasklist"
                  url: "https://example.com/orchestration/tasklist"
                - id: "orchestration"
                  urls:
                    grpc: "https://grpc.example.com:443"
                    http: "https://example.com/orchestration"
